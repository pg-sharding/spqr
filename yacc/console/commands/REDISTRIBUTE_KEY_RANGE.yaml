name: REDISTRIBUTE KEY RANGE
description: |
  Moves a key range to a different shard, including the actual data migration.

  The operation can be run in check-only mode to validate before applying, and
  supports batch processing to control the migration pace.

warnings:
  - This command is not available for installations without SPQR coordinator.

syntax: |
  REDISTRIBUTE KEY RANGE <keyRangeID> TO <shardID>
    [BATCH SIZE <batchSize>]
    [TASK GROUP <taskGroupID>]
    [CHECK | APPLY | NOWAIT]

parameters:
  - name: keyRangeID
    description: Identifier of the key range to redistribute
  - name: shardID
    description: Target shard ID to migrate data to
  - name: batchSize
    description: Number of rows to migrate per batch (optional, default 500)
  - name: taskGroupID
    description: Task group identifier for tracking the operation (optional)
  - name: CHECK
    description: Only validate the redistribution without applying changes
  - name: APPLY
    description: Validate and apply the redistribution (default behavior)
  - name: NOWAIT
    description: Start the redistribution and return immediately without waiting for completion

examples:
  - description: Redistribute with default settings
    code: REDISTRIBUTE KEY RANGE krid1 TO sh2;
  - description: Redistribute with custom batch size
    code: REDISTRIBUTE KEY RANGE krid1 TO sh2 BATCH SIZE 100;
  - description: Check redistribution without applying
    code: REDISTRIBUTE KEY RANGE krid1 TO sh2 CHECK;
  - description: Non-blocking redistribution
    code: REDISTRIBUTE KEY RANGE krid1 TO sh2 BATCH SIZE 500 NOWAIT;
  - description: Redistribute with task group for tracking
    code: REDISTRIBUTE KEY RANGE krid1 TO sh2 TASK GROUP taskgroup1;

tips:
  - Use CHECK mode first to validate before applying in production
  - Adjust BATCH SIZE to balance migration speed vs. cluster load
  - Use NOWAIT for large migrations and monitor progress with SHOW task_group
  - For metadata-only changes (when data is already on the target), use MOVE KEY RANGE instead

related_commands:
  - MOVE KEY RANGE
  - SHOW KEY RANGES
  - CREATE KEY RANGE
  - SPLIT KEY RANGE
