name: DROP DISTRIBUTION
snippet: distribution_commands
description: |
  Removes a distribution from cluster metadata.

  Use CASCADE to remove dependent metadata objects (key ranges, attached relations) when required.

syntax: |
  DROP DISTRIBUTION <distributionID> [CASCADE]

parameters:
  - name: distributionID
    description: Identifier of the distribution to drop
  - name: CASCADE
    description: Also remove dependent metadata objects

examples:
  - description: Drop one distribution
    code: DROP DISTRIBUTION ds1;
  - description: Drop distribution with dependent metadata
    code: DROP DISTRIBUTION ds1 CASCADE;

warnings:
  - Dropping a distribution removes routing metadata and may impact attached relations.

tips:
  - Check current distributions and dependencies with SHOW before dropping

related_commands:
  - CREATE DISTRIBUTION
  - ALTER DISTRIBUTION
  - SHOW
