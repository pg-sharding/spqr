host: spqr_coordinator
coordinator_port: 7002
grpc_api_port: 7003
qdb_addr: '[spqr_qdb]:2379'
log_level: DEBUG

shard_data_in_qdb: true
frontend_rules:
  - usr: user1
    db: db1
    pool_default: true
    pool_mode: TRANSACTION
    pool_prepared_statement: false
    auth_rule:
      auth_method: ok
forbid_direct_shard_queries: true