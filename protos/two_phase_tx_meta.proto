syntax = "proto3";

package spqr;

option go_package = "spqr/proto";

import "google/protobuf/empty.proto";

message TwoPhaseTxMetaStorageReply {
    repeated string storage = 1;
}

service TwoPhaseTxMetaService {
  rpc GetTwoPhaseTxMetaStorage(google.protobuf.Empty) returns (TwoPhaseTxMetaStorageReply);
}
