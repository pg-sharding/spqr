syntax = "proto3";

package spqr;

option go_package = "spqr/proto";

import "buf/validate/validate.proto";
import "google/protobuf/empty.proto";

import "protos/qualified_name.proto";
import "protos/meta_transaction.proto";
import "protos/distribution_entities.proto";

message CreateDistributionRequest{
  repeated Distribution distributions = 1;
}

message CreateDistributionReply{
  repeated MetaTransactionGossipCommand metaCmdList = 1;
}

message ListDistributionsReply {
  repeated Distribution distributions = 1;
}

message DropDistributionRequest {
  repeated string ids = 1;
}

message AlterDistributionAttachRequest{
  string id = 1 [(buf.validate.field).required = true];
  repeated DistributedRelation relations = 3;
}

message AlterDistributionDetachRequest{
  string id = 1 [(buf.validate.field).required = true];
  repeated QualifiedName relNames = 2;
}

message AlterDistributedRelationSchemaRequest{
  string id = 1 [(buf.validate.field).required = true];
  string relationName = 2 [(buf.validate.field).required = true];
  string schemaName = 3;
}

message AlterDistributedRelationDistributionKeyRequest{
  string id = 1 [(buf.validate.field).required = true];
  string relationName = 2 [(buf.validate.field).required = true];
  repeated DistributionKeyEntry distributionKey = 3;
}

message AlterDistributedRelationRequest{
  string id = 1 [(buf.validate.field).required = true];
  DistributedRelation relation = 2 [(buf.validate.field).required = true];
}

message GetDistributionRequest{
  string id = 1 [(buf.validate.field).required = true];
}

message GetDistributionReply {
  Distribution distribution = 1;
}

message GetRelationDistributionRequest {
  string name = 1 [(buf.validate.field).required = true];
  string schemaName = 2;
}

message GetRelationDistributionReply {
  Distribution distribution = 1;
}

message NextRangeRequest {
  string seq = 1 [(buf.validate.field).required = true];
  int64 rangeSize = 2;
}

message NextRangeReply {
  int64 left = 1;
  int64 right = 2;
}

message CurrValRequest {
  string seq = 1 [(buf.validate.field).required = true];
}

message CurrValReply {
  int64 value = 1;
}

message ListSequencesReply {
  repeated string names = 1;
}

message DropSequenceRequest {
  string name = 1 [(buf.validate.field).required = true];
  bool force = 2;
}

message ListRelationSequencesRequest {
  string name = 1 [(buf.validate.field).required = true];
  string schemaName = 2;
}

message ListRelationSequencesReply {
  map<string, string> columnSequences = 1;
}

message CreateUniqueIndexRequest {
  string distributionId = 1 [(buf.validate.field).required = true];
  UniqueIndex idx = 2 [(buf.validate.field).required = true];
}

message DropUniqueIndexRequest {
  string idxId = 2 [(buf.validate.field).required = true];
}

message ListDistributionUniqueIndexesRequest {
  string distributionId = 1 [(buf.validate.field).required = true];
}

message ListUniqueIndexesReply {
  map<string, UniqueIndex> indexes = 1;
}

message ListRelationUniqueIndexesRequest {
  string relationName = 1 [(buf.validate.field).required = true];
}

message AlterSequenceDetachRelationRequest {
  QualifiedName relationName = 1 [(buf.validate.field).required = true];
}

message GetSequenceRelationsRequest {
  string name  = 1 [(buf.validate.field).required = true];
}

message GetSequenceRelationsReply {
  repeated QualifiedName relNames = 1;
}

service DistributionService {
  rpc CreateDistribution(CreateDistributionRequest) returns (CreateDistributionReply) {}
  rpc DropDistribution(DropDistributionRequest) returns (google.protobuf.Empty) {}
  rpc ListDistributions(google.protobuf.Empty) returns (ListDistributionsReply) {}

  rpc AlterDistributionAttach(AlterDistributionAttachRequest) returns (google.protobuf.Empty) {}
  rpc AlterDistributionDetach(AlterDistributionDetachRequest) returns (google.protobuf.Empty) {}
  rpc AlterDistributedRelation(AlterDistributedRelationRequest) returns (google.protobuf.Empty) {}
  rpc AlterDistributedRelationSchema(AlterDistributedRelationSchemaRequest) returns (google.protobuf.Empty) {}
  rpc AlterDistributedRelationDistributionKey(AlterDistributedRelationDistributionKeyRequest) returns (google.protobuf.Empty) {}

  rpc GetDistribution(GetDistributionRequest) returns (GetDistributionReply) {}

  rpc GetRelationDistribution(GetRelationDistributionRequest) returns (GetRelationDistributionReply) {}

  rpc NextRange(NextRangeRequest) returns (NextRangeReply) {}
  rpc CurrVal(CurrValRequest) returns (CurrValReply) {}

  rpc ListSequences(google.protobuf.Empty) returns (ListSequencesReply) {}
  rpc ListRelationSequences(ListRelationSequencesRequest) returns (ListRelationSequencesReply) {}
  rpc DropSequence(DropSequenceRequest) returns (google.protobuf.Empty) {}
  rpc AlterSequenceDetachRelation(AlterSequenceDetachRelationRequest) returns (google.protobuf.Empty) {}
  rpc GetSequenceRelations(GetSequenceRelationsRequest) returns (GetSequenceRelationsReply) {}

  rpc ListUniqueIndexes(google.protobuf.Empty) returns (ListUniqueIndexesReply) {}
  rpc ListDistributionUniqueIndexes(ListDistributionUniqueIndexesRequest) returns (ListUniqueIndexesReply) {}
  rpc CreateUniqueIndex(CreateUniqueIndexRequest) returns (google.protobuf.Empty) {}
  rpc DropUniqueIndex(DropUniqueIndexRequest) returns (google.protobuf.Empty) {}
  rpc ListRelationUniqueIndexes(ListRelationUniqueIndexesRequest) returns (ListUniqueIndexesReply) {}
}
